<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ice Cream Invitation</title>

<style>
body {
    background: linear-gradient(to right, #ffecd2, #fcb69f);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    text-align: center;
    width: 340px;
    position: relative;
}
h1 { color: #ff6f61; }
p { color: #555; }

.btn {
    margin: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 16px;
}
.yes { background: #ff6f61; color: white; }
.no { background: #ccc; position: absolute; }

input {
    margin: 8px;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
</style>

</head>
<body>

<div class="card" id="card">
    <h1>🍦 Ice Cream Date?</h1>
    <p>Life is sweeter with ice cream 🍨</p>
    <p>...and even sweeter with you 😊</p>

    <button class="btn yes" onclick="showForm()">Yes 💖</button>
    <button class="btn no" id="noBtn">No 😢</button>
</div>

<script>
// No button runs away
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", function() {
    const x = Math.random() * 250;
    const y = Math.random() * 250;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// Show date/time form
function showForm() {
    document.getElementById("card").innerHTML = `
        <h1>Yay!! 💖</h1>
        <p>Pick a date & time 😊</p>
        <input type="date" id="date"><br>
        <input type="time" id="time"><br>
        <button class="btn yes" onclick="sendWhatsApp()">Confirm 🍦</button>
    `;
}

// Send WhatsApp with selected info
function sendWhatsApp() {
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;

    if (!date || !time) {
        alert("Please select both date and time 😊");
        return;
    }

    const message = encodeURIComponent(
        `Hey! I said YES to the ice cream date 🍦💖\nDate: ${date}\nTime: ${time}`
    );

    window.open(`https://wa.me/923126501671?text=${message}`, "_blank");
}
</script>

</body>
</html>
